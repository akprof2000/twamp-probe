# Сборка и тесты решения на каждый push и pull request.
name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Установка .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Сборка решения
        run: dotnet build SPI.TWamp.slnx -c Release

      - name: Юнит-тесты
        run: dotnet test SPI.Twamp.Tests/SPI.Twamp.Tests.csproj -c Release --no-build

  # Go-проба: статический анализ, юнит-тесты и сборка обоих таргетов.
  go-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Установка Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go-probe/go.sum

      - name: Проверка и тесты
        working-directory: go-probe
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt: файлы не отформатированы"; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...

      - name: Сборка (linux + windows)
        working-directory: go-probe
        run: |
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build ./...
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./...
