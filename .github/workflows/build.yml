# Сборка и тесты решения на каждый push и pull request.
name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Установка .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Сборка решения
        run: dotnet build SPI.TWamp.slnx -c Release

      - name: Юнит-тесты
        run: dotnet test SPI.Twamp.Tests/SPI.Twamp.Tests.csproj -c Release --no-build
